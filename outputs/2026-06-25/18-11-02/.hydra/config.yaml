experiment:
  name: vggtomega_full
  group: frames2pts3d_vggtomega
paths:
  image_dir: data/incoming/images
  output_base: data/intermediates/frames2pts3d
  hydra_logs: logs/hydra/frames2pts3d_vggtomega
  cache_dir: /tmp/cache_vggtomega
model:
  checkpoint_path: data/models/vggt_omega_1b_512.pt
  embedding_dim: 512
images:
  file_pattern: '*.jpg'
  resize_resolution: 512
pairs:
  scene_graph: sequential
  symmetrize: true
alignment:
  coarse_phase:
    learning_rate: 0.07
    iterations: 300
    description: Coarse phase alignment with VGGT-Omega features
  fine_phase:
    learning_rate: 0.01
    iterations: 300
    description: Fine phase alignment with VGGT-Omega features
visualization:
  enabled: true
  image_idx: 0
  dpi: 150
  confidence_threshold: 0.1
  figure_size:
  - 12
  - 9
  colormap: viridis
  point_size: 1
  alpha: 0.6
output:
  save_poses: true
  save_focals: true
  save_point_clouds: true
  save_visualization: true
  save_config: true
