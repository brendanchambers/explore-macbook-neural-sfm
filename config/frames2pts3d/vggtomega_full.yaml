# Frames to 3D Points workflow configuration using VGGT-Omega encoder
# Extract dense 3D points from video frames using VGGT-Omega features and sparse global alignment

experiment:
  name: "vggtomega_teensy"
  group: "frames2pts3d_vggtomega"

paths:
  # Input paths
  image_dir: "data/incoming/images_teensy"

  # Output paths
  output_base: "data/intermediates/frames2pts3d"
  hydra_logs: "logs/hydra/frames2pts3d_vggtomega"

  # Cache
  cache_dir: "/tmp/cache_vggtomega"

model:
  # VGGT-Omega model configuration
  checkpoint_path: "data/models/vggt_omega_1b_512.pt"
  # Alternative: "data/models/vggt_omega_1b_256_text.pt"
  embedding_dim: 512

images:
  # Image loading configuration
  file_pattern: "*.jpg"
  resize_resolution: 512  # VGGT-Omega typically uses 512-512 or similar

pairs:
  # Image pair configuration
  scene_graph: "sequential"  # Options: "complete", "sequential", "overlapping"
  symmetrize: true

alignment:
  # Sparse global alignment parameters
  coarse_phase:
    learning_rate: 0.07
    iterations: 300
    description: "Coarse phase alignment with VGGT-Omega features"

  fine_phase:
    learning_rate: 0.01
    iterations: 300
    description: "Fine phase alignment with VGGT-Omega features"

visualization:
  # Visualization parameters
  enabled: true
  image_idx: 0  # Which image to visualize
  dpi: 150
  confidence_threshold: 0.1
  figure_size: [12, 9]
  colormap: "viridis"
  point_size: 1
  alpha: 0.6

output:
  # Output saving configuration
  save_poses: true
  save_focals: true
  save_point_clouds: true
  save_visualization: true
  save_config: true
